spring.application.name=vehicle-maintenance

# ===== Datasource (PostgreSQL) =====
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vehicle_maintenance}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===== File Upload =====
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}
app.file.upload-dir=${UPLOAD_DIR:uploads}

# ===== JWT =====
app.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-base64-secret-at-least-256-bits-long-000}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===== Server =====
server.port=${SERVER_PORT:8080}

# ===== Logging =====
logging.level.com.example.vehicle_maintenance=INFO
